---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  SERVER_PORT: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
      - name: monitor
        image: your-registry/monitor-image:tag
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /data
        envFrom:
        - configMapRef:
            name: app-config
      volumes:
      - name: data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: monitor
spec:
  selector:
    app: monitor
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 10
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
      - name: server
        image: your-registry/server-image:tag
        command: ["python", "server.py"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: data
          mountPath: /data
        envFrom:
        - configMapRef:
            name: app-config
      volumes:
      - name: data
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: server
spec:
  selector:
    app: server
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
